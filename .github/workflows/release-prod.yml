name: Build (Personal)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build (arm64 | x64 | both)'
        required: false
        default: 'x64'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: Install system build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: >
          apt-get update &&
          apt-get install -y
          build-essential
          ca-certificates
          curl
          git
          libsecret-1-dev
          pkg-config
          python-is-python3
          python3
          python3-setuptools
          python3-wheel
          rpm
          xz-utils
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          setup-python: 'false'

      - run: pnpm run build

      - name: Build Linux packages
        working-directory: apps/emdash-desktop
        run: >
          node --experimental-strip-types scripts/release/build.ts
          --platform linux --arch x64

      - name: Verify Linux native modules
        working-directory: apps/emdash-desktop
        run: node --experimental-strip-types scripts/release/verify-linux.ts

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: emdash-linux
          retention-days: 1
          path: |
            apps/emdash-desktop/release/*.AppImage
            apps/emdash-desktop/release/*.deb
            apps/emdash-desktop/release/*.rpm

  build-win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          windows-native: 'true'
      - name: Export Python path for native modules
        shell: bash
        run: echo "python=$(which python)" >> "$GITHUB_ENV"

      - name: Build app
        shell: bash
        run: pnpm run build

      - name: Build Windows packages
        shell: bash
        working-directory: apps/emdash-desktop
        run: >
          node --experimental-strip-types scripts/release/build.ts
          --platform win --arch x64

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: emdash-windows
          retention-days: 1
          path: |
            apps/emdash-desktop/release/*.exe
            apps/emdash-desktop/release/*.msi

  publish-release:
    needs: [build-linux, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        run: |
          version="$(node -p "require('./apps/emdash-desktop/package.json').version")"
          echo "tag=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "title=Emdash v${version} (build ${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.meta.outputs.tag }}"
          artifacts/*
          --repo "$GITHUB_REPOSITORY"
          --target "$GITHUB_SHA"
          --title "${{ steps.meta.outputs.title }}"
          --notes "Personal build of ${GITHUB_SHA} from run #${GITHUB_RUN_NUMBER}."
